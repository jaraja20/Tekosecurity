version: "3.8"

# TEKOSECURE Backend — on-prem stack.
# Usage: docker compose --env-file .env up -d

services:
  backend:
    build: .
    image: tekosecure-backend:latest
    container_name: tekosecure-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    # network_mode: host  # Uncomment on Linux if you need direct LAN access to Mikrotiks

  # Optional Cloudflare Tunnel — exposes backend to Internet with HTTPS.
  # Configure token from: dash.cloudflare.com → Zero Trust → Networks → Tunnels
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: tekosecure-tunnel
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - backend
